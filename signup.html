<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Account | Avenmark Accounts</title>

    <link rel="stylesheet" href="css/style.css">

</head>


<body>


<header class="main-header">

    <div class="brand">

        <img 
            src="assets/Untitled design.png"
            alt="Avenmark Logo"
            class="logo"
        >

        <h1>AVENMARK ACCOUNTS</h1>

    </div>


    <nav class="header-actions">

        <a href="login.html" class="nav-button secondary">
            Sign In
        </a>

    </nav>

</header>



<main class="hero">

<section class="hero-content">


    <div id="signup-container">


        <h2>
            Create your Avenmark Account.
        </h2>


        <p>
            One account. Every Avenmark experience.
        </p>



        <form id="signup-form" class="account-form">


            <div class="input-group">

                <input 
                    type="text"
                    id="display-name"
                    placeholder="Display Name"
                    autocomplete="name"
                    required
                >

                <small id="display-name-status"></small>

            </div>



            <div class="input-group">

                <input 
                    type="text"
                    id="username"
                    placeholder="Username"
                    autocomplete="username"
                    required
                >

                <small id="username-status"></small>

            </div>



            <div class="input-group">

                <input 
                    type="email"
                    id="email"
                    placeholder="Email"
                    autocomplete="email"
                    required
                >

                <small id="email-status"></small>

            </div>



            <div class="input-group">

                <input 
                    type="password"
                    id="password"
                    placeholder="Password"
                    autocomplete="new-password"
                    required
                >

                <small id="password-status"></small>

            </div>



            <button 
                type="submit"
                id="signup-button"
                class="button primary"
                disabled
            >
                Create Account
            </button>


        </form>


        <p id="signup-message"></p>


    </div>





    <div id="verification-screen" style="display:none;">


        <h2>
            Check your email.
        </h2>


        <p>
            We sent a verification link to:
        </p>


        <p id="verification-email"></p>


        <p>
            Click the link in your email to activate your Avenmark Account.
        </p>


        <button 
            id="resend-email"
            class="button secondary"
        >
            Resend Email
        </button>


    </div>



</section>

</main>




<footer class="footer">

    <p>
        Avenmark Accounts
    </p>

    <p>
        Identity across the Avenmark ecosystem.
    </p>

</footer>





<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<script src="js/signup.js"></script>


</body>

</html>
