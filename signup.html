<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Account | Avenmark Accounts</title>

    <link rel="stylesheet" href="css/style.css">

</head>


<body>


<header class="main-header">

    <div class="brand">

        <img 
            src="assets/Untitled design.png"
            alt="Avenmark Logo"
            class="logo"
        >

        <h1>AVENMARK ACCOUNTS</h1>

    </div>


    <nav class="header-actions">

        <a href="login.html" class="nav-button secondary">
            Sign In
        </a>

    </nav>


</header>



<main class="hero">


<section class="hero-content">


    <h2>
        Create your Avenmark Account.
    </h2>


    <p>
        One account. Every Avenmark experience.
    </p>



    <form id="signup-form" class="account-form">


        <input 
            type="text"
            id="display-name"
            placeholder="Display Name"
            required
        >


        <input 
            type="text"
            id="username"
            placeholder="Username"
            required
        >


        <input 
            type="email"
            id="email"
            placeholder="Email"
            required
        >


        <input 
            type="password"
            id="password"
            placeholder="Password"
            required
        >



        <button 
            type="submit"
            class="button primary"
        >
            Create Account
        </button>


    </form>


    <p id="signup-message"></p>


</section>


</main>



<footer class="footer">

    <p>
        Avenmark Accounts
    </p>

    <p>
        Identity across the Avenmark ecosystem.
    </p>

</footer>




<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<script src="js/signup.js"></script>


</body>

</html>
