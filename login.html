<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sign In | Avenmark Accounts</title>

    <link rel="stylesheet" href="css/style.css">

</head>


<body>


<header class="main-header">

    <div class="brand">

        <img 
            src="assets/Untitled design.png"
            alt="Avenmark Logo"
            class="logo"
        >

        <h1>AVENMARK ACCOUNTS</h1>

    </div>


    <nav class="header-actions">

        <a href="signup.html" class="nav-button secondary">
            Create Account
        </a>

    </nav>


</header>



<main class="hero">


<section class="hero-content">


    <h2>
        Welcome back.
    </h2>


    <p>
        Sign in to your Avenmark Account.
    </p>



    <form id="login-form" class="account-form">


        <input 
            type="email"
            id="email"
            placeholder="Email"
            required
        >


        <input 
            type="password"
            id="password"
            placeholder="Password"
            required
        >



        <button 
            type="submit"
            class="button primary"
        >
            Sign In
        </button>


    </form>



    <p id="login-message"></p>



</section>


</main>



<footer class="footer">

    <p>
        Avenmark Accounts
    </p>

    <p>
        Your identity across Avenmark.
    </p>

</footer>



<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<script src="js/login.js"></script>


</body>

</html>
